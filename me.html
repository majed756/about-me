<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحتي الشخصية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .profile-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #007bff;
            margin-bottom: 20px;
        }
        h1 {
            margin: 10px 0;
            font-size: 24px;
            color: #222;
        }
        .title {
            color: #007bff;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .bio {
            font-size: 14px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 20px;
        }
        .links a {
            display: inline-block;
            margin: 0 10px;
            color: #333;
            text-decoration: none;
            font-size: 20px;
            transition: color 0.3s;
        }
        .links a:hover {
            color: #007bff;
        }
    </style>
</head>
<body>

    <div class="profile-card">
         <img src="logo.jpg" class="profile-img">
        
        <h1>ماجد محمد العثمان</h1>
        <p class="title">مطور برمجيات / مهندس ميكانيكي/ مهندس شبكات</p>
        
        <p class="bio">
            مرحباً بك في صفحتي الشخصية! أنا شغوف ببناء الروبوتات وتطوير البرمجيات. أحب تحويل الأفكار الميكانيكية والبرمجية إلى واقع ملموس.
        </p>
        
        <div class="links">
            <a href="https://github.com/majed756" target="_blank">GitHub</a>
        </div>
    </div>

</body>
</html>
